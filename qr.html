<!DOCTYPE html>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0a1f44 0%, #1a3a6b 50%, #0d2b56 100%);
    min-height: 100vh;

    padding: 12px;
    background: #f8f9ff;
    border-radius: 12px;
    margin-bottom: 16px;

  .url {

    color: #0a6ed1;
