<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伊赫莱拜访训练 - 扫码访问</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #0033A0 0%, #001E5F 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 40px 30px;
    text-align: center;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .card h2 {
    font-size: 22px;
    color: #0033A0;
    margin-bottom: 6px;
  }
  .card .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 24px;
  }
  #qrcode {
    display: inline-block;
    padding: 12px;
    background: #fff;
    border-radius: 12px;
    border: 2px solid #e8ecf1;
    margin-bottom: 20px;
  }
  #qrcode img, #qrcode canvas {
    display: block;
    margin: 0 auto;
  }
  .url-box {
    background: #f5f7fa;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #555;
    word-break: break-all;
    margin-bottom: 20px;
    border: 1px solid #e8ecf1;
  }
  .tip {
    font-size: 12px;
    color: #aaa;
    line-height: 1.6;
  }
  .badge {
    display: inline-block;
    background: #e8f0fe;
    color: #0033A0;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="badge">微信扫码即可访问</div>
  <h2>伊赫莱拜访训练</h2>
  <p class="subtitle">伊那利塞 · 医药代表拜访模拟训练</p>
  
  <div id="qrcode"></div>
  
  <div class="url-box">
    ihl-training-production.up.railway.app
  </div>
  
  <div class="tip">
    💡 微信内长按扫码即可打开<br>
    🖥️ 也可在电脑浏览器中访问
  </div>
</div>

<script>
  const url = "https://ihl-training-production.up.railway.app";
  new QRCode(document.getElementById("qrcode"), {
    text: url,
    width: 220,
    height: 220,
    colorDark: "#0033A0",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
